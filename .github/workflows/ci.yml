name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: shellcheck
        run: shellcheck --severity=warning conduck-connect.sh scripts/*.sh

      - name: bash syntax (parse-only, never executes the wizard)
        run: bash -n conduck-connect.sh

      - name: verify vendored QR encoder (pinned checksum + stdlib-only imports)
        run: bash scripts/verify-vendored-encoder.sh

      - name: URL-normalization parity fixtures (mirror of the app's Swift suite)
        run: bash scripts/test-url-normalization.sh

      - name: /v1/models probe classification (live local mock server)
        run: bash scripts/test-models-probe.sh
